<!-- leaves.html -->

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Leave Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
}

.container{
display:flex;
}

.sidebar{
width:300px;
min-height:100vh;
background:rgba(0,0,0,0.15);
padding:20px;
}

.logo{
font-size:42px;
font-weight:bold;
margin-bottom:40px;
}

.menu a{
display:block;
padding:18px;
margin-bottom:14px;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
}

.topbar h1{
font-size:56px;
margin-bottom:35px;
}

.card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:25px;
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

input,select{
width:100%;
padding:18px;
border:none;
border-radius:14px;
font-size:16px;
}

button{
margin-top:25px;
padding:16px 28px;
border:none;
border-radius:14px;
background:#57cc99;
color:white;
cursor:pointer;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:18px;
border-top:1px solid rgba(255,255,255,0.08);
}

.pending{
color:#ffd43b;
}

.approved{
color:#57cc99;
}

.rejected{
color:#ff4d6d;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<div class="logo">
ERP System
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>
<a href="employees.html">👥 Employees</a>
<a href="attendance.html">🕒 Attendance</a>
<a href="leaves.html">🏖 Leave Management</a>
<a href="payroll.html">💰 Payroll</a>
<a href="inventory.html">📦 Inventory</a>
<a href="purchase.html">🛒 Purchase</a>
<a href="expenses.html">💳 Expenses</a>
<a href="reports.html">📈 Reports</a>
<a href="settings.html">⚙️ Settings</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>Leave Management</h1>

</div>

<div class="card">

<h2>Apply Leave</h2>

<br>

<div class="form-grid">

<div>

<label>Employee Name</label>

<input type="text"
id="leaveName">

</div>

<div>

<label>Leave Type</label>

<select id="leaveType">

<option>Sick Leave</option>
<option>Casual Leave</option>
<option>Emergency Leave</option>

</select>

</div>

<div>

<label>From Date</label>

<input type="date"
id="fromDate">

</div>

<div>

<label>To Date</label>

<input type="date"
id="toDate">

</div>

</div>

<button onclick="applyLeave()">

Apply Leave

</button>

</div>

<div class="card">

<h2>Leave Records</h2>

<table id="leaveTable">

<tr>

<th>Employee</th>
<th>Type</th>
<th>From</th>
<th>To</th>
<th>Status</th>
<th>Actions</th>

</tr>

</table>

</div>

</div>

</div>

<script>

let leaves =
JSON.parse(
localStorage.getItem(
"leaves"
)
) || [];

renderLeaves();

function applyLeave(){

const name =
document.getElementById(
"leaveName"
).value;

const type =
document.getElementById(
"leaveType"
).value;

const from =
document.getElementById(
"fromDate"
).value;

const to =
document.getElementById(
"toDate"
).value;

leaves.push({

name,
type,
from,
to,
status:"Pending"

});

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

renderLeaves();

}

function renderLeaves(){

const table =
document.getElementById(
"leaveTable"
);

table.innerHTML = `

<tr>

<th>Employee</th>
<th>Type</th>
<th>From</th>
<th>To</th>
<th>Status</th>
<th>Actions</th>

</tr>

`;

leaves.forEach((leave,index)=>{

let statusClass = "";

if(leave.status === "Pending"){
statusClass = "pending";
}

if(leave.status === "Approved"){
statusClass = "approved";
}

if(leave.status === "Rejected"){
statusClass = "rejected";
}

table.innerHTML += `

<tr>

<td>${leave.name}</td>

<td>${leave.type}</td>

<td>${leave.from}</td>

<td>${leave.to}</td>

<td class="${statusClass}">
${leave.status}
</td>

<td>

<button
onclick="approveLeave(${index})">

Approve

</button>

<button
onclick="rejectLeave(${index})">

Reject

</button>

</td>

</tr>

`;

});

}

function approveLeave(index){

leaves[index].status =
"Approved";

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

renderLeaves();

}

function rejectLeave(index){

leaves[index].status =
"Rejected";

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

renderLeaves();

}

</script>

</body>

</html>
