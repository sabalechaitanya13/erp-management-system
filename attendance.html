<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Attendance Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
transition:0.3s;
}

.dark-mode{
background:linear-gradient(135deg,#111,#222);
}

.container{
display:flex;
}

.sidebar{
width:300px;
min-height:100vh;
background:rgba(0,0,0,0.15);
padding:20px;
}

.logo{
font-size:42px;
font-weight:bold;
margin-bottom:40px;
}

.menu a{
display:block;
padding:18px;
margin-bottom:14px;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
}

.main{
flex:1;
padding:40px;
}

.topbar h1{
font-size:56px;
margin-bottom:35px;
}

.card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:25px;
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

input{
width:100%;
padding:18px;
border:none;
border-radius:14px;
font-size:16px;
}

button{
margin-top:25px;
padding:16px 28px;
border:none;
border-radius:14px;
background:#57cc99;
color:white;
cursor:pointer;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:18px;
text-align:left;
border-top:1px solid rgba(255,255,255,0.08);
}

.summary-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.summary-card{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
}

.summary-card h1{
font-size:42px;
margin-top:10px;
}

.present{
color:#57cc99;
font-weight:bold;
}

.absent{
color:#ff4d6d;
font-weight:bold;
}

</style>

</head>

<body id="body" style="display:none;">

<script src="auth.js"></script>

<script>

if(
!ERPAuth.isAuthenticated()
){

window.location.href =
"index.html";

}else{

document.body.style.display =
"block";

}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">
ERP System
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>

<a href="employees.html">👥 Employees</a>

<a href="attendance.html">🕒 Attendance</a>

<a href="leaves.html">🏖 Leave Management</a>

<a href="payroll.html">💰 Payroll</a>

<a href="inventory.html">📦 Inventory</a>

<a href="purchase.html">🛒 Purchase</a>

<a href="expenses.html">💳 Expenses</a>

<a href="reports.html">📈 Reports</a>

<a href="settings.html">⚙️ Settings</a>

<a href="#"
onclick="ERPAuth.logout()">

🚪 Logout

</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>Attendance</h1>

</div>

<div class="summary-grid">

<div class="summary-card">
<h2>Total Records</h2>
<h1 id="totalRecords">0</h1>
</div>

<div class="summary-card">
<h2>Present</h2>
<h1 id="presentCount">0</h1>
</div>

<div class="summary-card">
<h2>Absent</h2>
<h1 id="absentCount">0</h1>
</div>

<div class="summary-card">
<h2>Total OT</h2>
<h1 id="totalOT">0h</h1>
</div>

</div>

<div class="card">

<h2>Add Attendance</h2>

<br>

<div class="form-grid">

<div>
<label>Employee Name</label>
<input type="text" id="empName">
</div>

<div>
<label>Date</label>
<input type="date" id="attendanceDate">
</div>

<div>
<label>Status</label>
<input type="text"
id="attendanceStatus"
placeholder="Present / Absent">
</div>

<div>
<label>OT Hours</label>
<input type="number" id="otHours">
</div>

</div>

<button onclick="addAttendance()">
Save Attendance
</button>

</div>

<div class="card">

<table id="attendanceTable">

<tr>

<th>Employee</th>
<th>Date</th>
<th>Status</th>
<th>OT Hours</th>
<th>Actions</th>

</tr>

</table>

</div>

</div>

</div>

<script>

window.onload = function(){

loadTheme();
renderAttendance();

};

function loadTheme(){

const darkMode =
localStorage.getItem(
"darkMode"
);

if(darkMode === "true"){

document.getElementById(
"body"
).classList.add(
"dark-mode"
);

}

}

let attendance =
JSON.parse(
localStorage.getItem("attendance")
) || [];

function addAttendance(){

const empName =
document.getElementById("empName").value;

const date =
document.getElementById("attendanceDate").value;

const status =
document.getElementById("attendanceStatus").value;

const ot =
document.getElementById("otHours").value;

if(
empName === "" ||
date === "" ||
status === ""
){
alert("Please fill all fields");
return;
}

attendance.push({
empName,
date,
status,
ot
});

localStorage.setItem(
"attendance",
JSON.stringify(attendance)
);

renderAttendance();

clearForm();

}

function renderAttendance(){

const table =
document.getElementById("attendanceTable");

table.innerHTML = `
<tr>
<th>Employee</th>
<th>Date</th>
<th>Status</th>
<th>OT Hours</th>
<th>Actions</th>
</tr>
`;

let present = 0;
let absent = 0;
let totalOT = 0;

attendance.forEach((record,index)=>{

if(
record.status.toLowerCase()
=== "present"
){
present++;
}else{
absent++;
}

totalOT += Number(record.ot || 0);

table.innerHTML += `

<tr>

<td>${record.empName}</td>

<td>${record.date}</td>

<td class="${
record.status.toLowerCase()
=== "present"
? "present"
: "absent"
}">

${record.status}

</td>

<td>${record.ot}</td>

<td>

<button
onclick="deleteAttendance(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById(
"totalRecords"
).innerText = attendance.length;

document.getElementById(
"presentCount"
).innerText = present;

document.getElementById(
"absentCount"
).innerText = absent;

document.getElementById(
"totalOT"
).innerText = totalOT + "h";

}

function deleteAttendance(index){

attendance.splice(index,1);

localStorage.setItem(
"attendance",
JSON.stringify(attendance)
);

renderAttendance();

}

function clearForm(){

document.getElementById("empName").value="";
document.getElementById("attendanceDate").value="";
document.getElementById("attendanceStatus").value="";
document.getElementById("otHours").value="";

}

</script>

</body>

</html>
