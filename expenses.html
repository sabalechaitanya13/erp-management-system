<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Expense Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
transition:0.3s;
}

.dark-mode{
background:linear-gradient(135deg,#111,#222);
}

.container{
display:flex;
}

.sidebar{
width:300px;
min-height:100vh;
background:rgba(0,0,0,0.15);
padding:20px;
}

.logo{
font-size:42px;
font-weight:bold;
margin-bottom:40px;
}

.menu a{
display:block;
padding:18px;
margin-bottom:14px;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
transition:0.3s;
}

.menu a:hover{
background:rgba(255,255,255,0.18);
}

.main{
flex:1;
padding:40px;
}

.topbar h1{
font-size:56px;
margin-bottom:35px;
}

.card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:25px;
margin-bottom:30px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

input,select{
width:100%;
padding:18px;
border:none;
border-radius:14px;
font-size:16px;
}

button{
margin-top:25px;
padding:16px 28px;
border:none;
border-radius:14px;
background:#57cc99;
color:white;
cursor:pointer;
font-size:16px;
margin-right:10px;
}

.export-btn{
background:#4dabf7;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:18px;
text-align:left;
border-top:1px solid rgba(255,255,255,0.08);
}

.summary-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.summary-card{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
}

.summary-card h1{
font-size:42px;
margin-top:10px;
}

.pending{
color:#ffd43b;
font-weight:bold;
}

.approved{
color:#57cc99;
font-weight:bold;
}

.rejected{
color:#ff4d6d;
font-weight:bold;
}

</style>

</head>

<body id="body" style="display:none;">

<script src="../js/auth.js"></script>

<script>

if(
!ERPAuth.isAuthenticated()
){

window.location.href =
"login.html";

}else{

document.body.style.display =
"block";

}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">
ERP System
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>

<a href="employees.html">👥 Employees</a>

<a href="attendance.html">🕒 Attendance</a>

<a href="leaves.html">🏖 Leave Management</a>

<a href="payroll.html">💰 Payroll</a>

<a href="inventory.html">📦 Inventory</a>

<a href="purchase.html">🛒 Purchase</a>

<a href="expenses.html">💳 Expenses</a>

<a href="reports.html">📈 Reports</a>

<a href="settings.html">⚙️ Settings</a>

<a href="#"
onclick="ERPAuth.logout()">

🚪 Logout

</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>Expense Management</h1>

</div>

<div class="summary-grid">

<div class="summary-card">
<h2>Total Expenses</h2>
<h1 id="totalExpenses">₹0</h1>
</div>

<div class="summary-card">
<h2>Total Records</h2>
<h1 id="totalRecords">0</h1>
</div>

<div class="summary-card">
<h2>Approved</h2>
<h1 id="approvedCount">0</h1>
</div>

<div class="summary-card">
<h2>Pending</h2>
<h1 id="pendingCount">0</h1>
</div>

</div>

<div class="card">

<h2>Add Expense</h2>

<br>

<div class="form-grid">

<div>
<label>Expense Title</label>
<input type="text" id="expenseTitle">
</div>

<div>
<label>Category</label>

<select id="expenseCategory">

<option>Travel</option>
<option>Office</option>
<option>Maintenance</option>
<option>Salary</option>
<option>Utilities</option>

</select>

</div>

<div>
<label>Amount</label>
<input type="number" id="expenseAmount">
</div>

<div>
<label>Status</label>

<select id="expenseStatus">

<option>Pending</option>
<option>Approved</option>
<option>Rejected</option>

</select>

</div>

</div>

<button onclick="addExpense()">
Save Expense
</button>

<button
class="export-btn"
onclick="exportExpenses()">

Export JSON

</button>

</div>

<div class="card">

<table id="expenseTable">

<tr>

<th>Title</th>
<th>Category</th>
<th>Amount</th>
<th>Status</th>
<th>Actions</th>

</tr>

</table>

</div>

</div>

</div>

<script>

window.onload = function(){

loadTheme();

};

function loadTheme(){

const darkMode =
localStorage.getItem(
"darkMode"
);

if(darkMode === "true"){

document.getElementById(
"body"
).classList.add(
"dark-mode"
);

}

}

let expenses =
JSON.parse(
localStorage.getItem("expenses")
) || [];

let editIndex = -1;

renderExpenses();

function addExpense(){

const title =
document.getElementById(
"expenseTitle"
).value;

const category =
document.getElementById(
"expenseCategory"
).value;

const amount =
document.getElementById(
"expenseAmount"
).value;

const status =
document.getElementById(
"expenseStatus"
).value;

const expenseData = {

title,
category,
amount,
status

};

if(editIndex === -1){

expenses.push(expenseData);

}else{

expenses[editIndex] =
expenseData;

editIndex = -1;

}

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

renderExpenses();

clearForm();

}

function renderExpenses(){

const table =
document.getElementById(
"expenseTable"
);

table.innerHTML = `
<tr>

<th>Title</th>
<th>Category</th>
<th>Amount</th>
<th>Status</th>
<th>Actions</th>

</tr>
`;

let total = 0;
let approved = 0;
let pending = 0;

expenses.forEach((expense,index)=>{

total +=
Number(expense.amount);

if(expense.status === "Approved"){
approved++;
}

if(expense.status === "Pending"){
pending++;
}

let statusClass = "";

if(expense.status === "Pending"){
statusClass = "pending";
}

if(expense.status === "Approved"){
statusClass = "approved";
}

if(expense.status === "Rejected"){
statusClass = "rejected";
}

table.innerHTML += `

<tr>

<td>${expense.title}</td>

<td>${expense.category}</td>

<td>₹${expense.amount}</td>

<td class="${statusClass}">
${expense.status}
</td>

<td>

<button
onclick="editExpense(${index})">

Edit

</button>

<button
onclick="deleteExpense(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById(
"totalExpenses"
).innerText =
"₹" + total;

document.getElementById(
"totalRecords"
).innerText =
expenses.length;

document.getElementById(
"approvedCount"
).innerText =
approved;

document.getElementById(
"pendingCount"
).innerText =
pending;

}

function editExpense(index){

const expense =
expenses[index];

document.getElementById(
"expenseTitle"
).value =
expense.title;

document.getElementById(
"expenseCategory"
).value =
expense.category;

document.getElementById(
"expenseAmount"
).value =
expense.amount;

document.getElementById(
"expenseStatus"
).value =
expense.status;

editIndex = index;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

function deleteExpense(index){

expenses.splice(index,1);

localStorage.setItem(
"expenses",
JSON.stringify(expenses)
);

renderExpenses();

}

function exportExpenses(){

const dataStr =
"data:text/json;charset=utf-8," +

encodeURIComponent(
JSON.stringify(expenses,null,2)
);

const downloadAnchor =
document.createElement("a");

downloadAnchor.setAttribute(
"href",
dataStr
);

downloadAnchor.setAttribute(
"download",
"expenses.json"
);

document.body.appendChild(
downloadAnchor
);

downloadAnchor.click();
