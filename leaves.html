<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Leave Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
color:white;
transition:0.3s;
}

.dark-mode{
background:linear-gradient(135deg,#111,#222);
}

.container{
display:flex;
}

.sidebar{
width:300px;
min-height:100vh;
background:rgba(0,0,0,0.15);
padding:20px;
}

.logo{
font-size:42px;
font-weight:bold;
margin-bottom:40px;
}

.menu a{
display:block;
padding:18px;
margin-bottom:14px;
border-radius:15px;
background:rgba(255,255,255,0.08);
color:white;
text-decoration:none;
transition:0.3s;
}

.menu a:hover{
background:rgba(255,255,255,0.18);
}

.main{
flex:1;
padding:40px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
}

.topbar h1{
font-size:56px;
}

.search-box{
width:320px;
padding:16px;
border:none;
border-radius:14px;
font-size:16px;
outline:none;
}

.summary-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:30px;
}

.summary-card{
background:rgba(255,255,255,0.12);
padding:25px;
border-radius:20px;
backdrop-filter:blur(10px);
transition:0.3s;
}

.summary-card:hover{
transform:translateY(-5px);
}

.summary-card h1{
font-size:42px;
margin-top:10px;
}

.card{
background:rgba(255,255,255,0.12);
padding:30px;
border-radius:25px;
margin-bottom:30px;
backdrop-filter:blur(10px);
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:25px;
}

label{
display:block;
margin-bottom:10px;
font-size:15px;
}

input,select,textarea{
width:100%;
padding:18px;
border:none;
border-radius:14px;
font-size:16px;
outline:none;
}

textarea{
min-height:120px;
resize:none;
}

button{
margin-top:25px;
padding:14px 22px;
border:none;
border-radius:14px;
cursor:pointer;
font-size:16px;
color:white;
margin-right:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.save-btn{
background:#57cc99;
}

.approve-btn{
background:#4dabf7;
}

.reject-btn{
background:#ff4d6d;
}

.delete-btn{
background:#ff6b6b;
}

.export-btn{
background:#845ef7;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:18px;
text-align:left;
border-top:1px solid rgba(255,255,255,0.08);
}

tr{
transition:0.3s;
}

tr:hover{
background:rgba(255,255,255,0.05);
}

.pending{
color:#ffd43b;
font-weight:bold;
}

.approved{
color:#57cc99;
font-weight:bold;
}

.rejected{
color:#ff4d6d;
font-weight:bold;
}

.badge{
padding:8px 14px;
border-radius:30px;
font-size:13px;
display:inline-block;
}

.activity-box{
margin-top:25px;
}

.activity-item{
padding:16px;
margin-top:12px;
background:rgba(255,255,255,0.08);
border-radius:14px;
}

@media(max-width:1200px){

.summary-grid{
grid-template-columns:1fr 1fr;
}

}

@media(max-width:900px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
min-height:auto;
}

.form-grid{
grid-template-columns:1fr;
}

.summary-grid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.search-box{
width:100%;
}

table{
display:block;
overflow-x:auto;
}

}

</style>

</head>

<body id="body" style="display:none;">

<script src="../js/auth.js"></script>

<script>

if(
!ERPAuth.isAuthenticated()
){

window.location.href =
"login.html";

}else{

document.body.style.display =
"block";

}

</script>

<div class="container">

<div class="sidebar">

<div class="logo">
ERP System
</div>

<div class="menu">

<a href="dashboard.html">📊 Dashboard</a>

<a href="employees.html">👥 Employees</a>

<a href="attendance.html">🕒 Attendance</a>

<a href="leaves.html">🏖 Leave Management</a>

<a href="payroll.html">💰 Payroll</a>

<a href="inventory.html">📦 Inventory</a>

<a href="purchase.html">🛒 Purchase</a>

<a href="expenses.html">💳 Expenses</a>

<a href="reports.html">📈 Reports</a>

<a href="settings.html">⚙️ Settings</a>

<a href="#"
onclick="ERPAuth.logout()">

🚪 Logout

</a>

</div>

</div>

<div class="main">

<div class="topbar">

<h1>Leave Management</h1>

<input
type="text"
class="search-box"
id="searchInput"
placeholder="Search Employee..."
onkeyup="searchLeaves()">

</div>

<div class="summary-grid">

<div class="summary-card">
<h2>Total Requests</h2>
<h1 id="totalLeaves">0</h1>
</div>

<div class="summary-card">
<h2>Approved</h2>
<h1 id="approvedLeaves">0</h1>
</div>

<div class="summary-card">
<h2>Pending</h2>
<h1 id="pendingLeaves">0</h1>
</div>

<div class="summary-card">
<h2>Rejected</h2>
<h1 id="rejectedLeaves">0</h1>
</div>

</div>

<div class="card">

<h2>Apply Leave</h2>

<br>

<div class="form-grid">

<div>

<label>
Employee Name
</label>

<input
type="text"
id="empName">

</div>

<div>

<label>
Leave Type
</label>

<select id="leaveType">

<option>Sick Leave</option>
<option>Casual Leave</option>
<option>Paid Leave</option>
<option>Maternity Leave</option>
<option>Emergency Leave</option>

</select>

</div>

<div>

<label>
Start Date
</label>

<input
type="date"
id="startDate">

</div>

<div>

<label>
End Date
</label>

<input
type="date"
id="endDate">

</div>

<div style="grid-column:1/3;">

<label>
Reason
</label>

<textarea
id="leaveReason">

</textarea>

</div>

</div>

<button
class="save-btn"
onclick="applyLeave()">

Apply Leave

</button>

<button
class="export-btn"
onclick="exportLeaves()">

Export JSON

</button>

</div>

<div class="card">

<h2>Leave Requests</h2>

<table id="leaveTable">

<tr>

<th>Employee</th>
<th>Type</th>
<th>Dates</th>
<th>Days</th>
<th>Status</th>
<th>Actions</th>

</tr>

</table>

<div class="activity-box"
id="activityBox">

</div>

</div>

</div>

</div>

<script>

window.onload = function(){

loadTheme();

renderLeaves();

};

function loadTheme(){

const darkMode =
localStorage.getItem(
"darkMode"
);

if(darkMode === "true"){

document.getElementById(
"body"
).classList.add(
"dark-mode"
);

}

}

let leaves =
JSON.parse(
localStorage.getItem(
"leaves"
)
) || [];

function applyLeave(){

const name =
document.getElementById(
"empName"
).value;

const type =
document.getElementById(
"leaveType"
).value;

const start =
document.getElementById(
"startDate"
).value;

const end =
document.getElementById(
"endDate"
).value;

const reason =
document.getElementById(
"leaveReason"
).value;

if(
name === "" ||
start === "" ||
end === ""
){

alert(
"Please Fill All Fields"
);

return;

}

const startDate =
new Date(start);

const endDate =
new Date(end);

const days =
Math.ceil(
(endDate - startDate)
/ (1000*60*60*24)
) + 1;

const leave = {

name,
type,
start,
end,
reason,
days,
status:"Pending"

};

leaves.push(leave);

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

addActivity(
name + " applied for leave"
);

renderLeaves();

clearForm();

}

function renderLeaves(filteredLeaves = leaves){

const table =
document.getElementById(
"leaveTable"
);

table.innerHTML = `

<tr>

<th>Employee</th>
<th>Type</th>
<th>Dates</th>
<th>Days</th>
<th>Status</th>
<th>Actions</th>

</tr>

`;

let approved = 0;
let pending = 0;
let rejected = 0;

filteredLeaves.forEach((leave,index)=>{

if(leave.status === "Approved"){
approved++;
}

if(leave.status === "Pending"){
pending++;
}

if(leave.status === "Rejected"){
rejected++;
}

let statusClass = "";

if(leave.status === "Pending"){
statusClass = "pending";
}

if(leave.status === "Approved"){
statusClass = "approved";
}

if(leave.status === "Rejected"){
statusClass = "rejected";
}

table.innerHTML += `

<tr>

<td>${leave.name}</td>

<td>${leave.type}</td>

<td>
${leave.start}
to
${leave.end}
</td>

<td>${leave.days}</td>

<td>

<span class="badge ${statusClass}">
${leave.status}
</span>

</td>

<td>

<button
class="approve-btn"
onclick="approveLeave(${index})">

Approve

</button>

<button
class="reject-btn"
onclick="rejectLeave(${index})">

Reject

</button>

<button
class="delete-btn"
onclick="deleteLeave(${index})">

Delete

</button>

</td>

</tr>

`;

});

document.getElementById(
"totalLeaves"
).innerText =
leaves.length;

document.getElementById(
"approvedLeaves"
).innerText =
approved;

document.getElementById(
"pendingLeaves"
).innerText =
pending;

document.getElementById(
"rejectedLeaves"
).innerText =
rejected;

}

function approveLeave(index){

leaves[index].status =
"Approved";

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

addActivity(
leaves[index].name +
" leave approved"
);

renderLeaves();

}

function rejectLeave(index){

leaves[index].status =
"Rejected";

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

addActivity(
leaves[index].name +
" leave rejected"
);

renderLeaves();

}

function deleteLeave(index){

if(
confirm(
"Delete Leave Request?"
)
){

addActivity(
leaves[index].name +
" leave deleted"
);

leaves.splice(index,1);

localStorage.setItem(
"leaves",
JSON.stringify(leaves)
);

renderLeaves();

}

}

function searchLeaves(){

const value =
document.getElementById(
"searchInput"
).value.toLowerCase();

const filtered =
leaves.filter((leave)=>{

return leave.name
.toLowerCase()
.includes(value);

});

renderLeaves(filtered);

}

function exportLeaves(){

const dataStr =
"data:text/json;charset=utf-8," +

encodeURIComponent(
JSON.stringify(leaves,null,2)
);

const downloadAnchor =
document.createElement("a");

downloadAnchor.setAttribute(
"href",
dataStr
);

downloadAnchor.setAttribute(
"download",
"leave-data.json"
);

document.body.appendChild(
downloadAnchor
);

downloadAnchor.click();

downloadAnchor.remove();

addActivity(
"Leave JSON exported"
);

}

function addActivity(message){

document.getElementById(
"activityBox"
).innerHTML += `

<div class="activity-item">

${message}

</div>

`;

}

function clearForm(){

document.getElementById(
"empName"
).value = "";

document.getElementById(
"startDate"
).value = "";

document.getElementById(
"endDate"
).value = "";

document.getElementById(
"leaveReason"
).value = "";

}

</script>

</body>

</html>
